server {
    listen 80;
    server_name www.disteladvisory.com;
    return 301 https://disteladvisory.com$request_uri;
}

server {
    set $config_version "1.0.0";

    listen 80;
    server_name localhost disteladvisory.com;
    root /usr/share/nginx/html;

    location /nginx-health {
        access_log off;
        return 200 "Configuration version: $config_version\n";
    }

    location = / { try_files /index.html =404; }
    location /  { try_files $uri $uri.html =404; }

    error_page 404 /404.html;
    location = /404.html { internal; }
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { internal; }

    gzip on;
    gzip_static on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript
               application/xml+rss image/svg+xml application/wasm;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
