server {
    listen 80;
    server_name www.disteladvisory.com;
    return 301 https://disteladvisory.com$request_uri;
}

server {
    set $config_version "1.0.0";

    listen 80;
    server_name localhost disteladvisory.com;
    root /usr/share/nginx/html;

    location /nginx-health {
        access_log off;
        return 200 "Configuration version: $config_version\n";
    }

    location ~ ^(.+)/$ {
        return 301 $1$is_args$args;
    }

    location = / { try_files /index.html =404; }
    location /  { try_files $uri $uri.html =404; }

    error_page 404 /404.html;
    location = /404.html { internal; }
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { internal; }

    gzip on;
    gzip_static on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript
               application/xml+rss image/svg+xml application/wasm;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://connect.facebook.net https://snap.licdn.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://fonts.googleapis.com; img-src 'self' data: https://www.googletagmanager.com https://www.google-analytics.com https://www.google.com https://www.google.com.sg https://www.googleadservices.com https://www.facebook.com https://px.ads.linkedin.com; connect-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://region1.google-analytics.com https://www.google.com https://www.google.com.sg https://www.googleadservices.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://stats.g.doubleclick.net https://www.facebook.com https://px.ads.linkedin.com https://*.linkedin.com https://cloudflareinsights.com; frame-src https://www.googletagmanager.com https://calendar.google.com; font-src 'self' https://fonts.gstatic.com;" always;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
